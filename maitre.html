<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master | CO-Logic Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CO-Logic">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; touch-action: manipulation; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .row-A { border-left: 8px solid #ef4444; background: rgba(239, 68, 68, 0.1); } 
        .row-B { border-left: 8px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .row-C { border-left: 8px solid #22c55e; background: rgba(34, 197, 94, 0.1); } 
        .row-D { border-left: 8px solid #eab308; background: rgba(234, 179, 8, 0.1); }
        .row-E { border-left: 8px solid #a855f7; background: rgba(168, 85, 247, 0.1); } 
        .row-F { border-left: 8px solid #ec4899; background: rgba(236, 72, 153, 0.1); }
        .row-ABS { border-left: 8px solid #dc2626; background: rgba(220, 38, 38, 0.1); }
        .row-INAPTE { border-left: 8px solid #ea580c; background: rgba(234, 88, 12, 0.1); }
        
        .case-correct { background-color: #16a34a !important; color: white !important; border: 4px solid #4ade80 !important; }
        .case-wrong { background-color: #991b1b !important; color: white !important; border: 4px solid #f87171 !important; text-decoration: line-through; opacity: 0.8; }
        .case-empty { background-color: white; color: #000; border: 4px solid #333; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-zinc-800 pb-4">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 uppercase italic">CO-Logic Master</h1>
            <button id="btnChrono" onclick="toggleChrono()" class="bg-emerald-600 px-6 py-3 rounded-full border-4 border-emerald-400 font-black text-white active:scale-95 transition-transform">🚀 TOP DÉPART</button>
            <div id="chronoDisplay" class="hidden text-3xl font-mono text-yellow-400 font-bold">00:00</div>
        </div>
        <div class="flex gap-2">
            <button onclick="exportiDoceo()" class="bg-green-600 px-6 py-3 rounded-xl font-black border-2 border-green-500 uppercase text-xs text-white active:bg-green-700">⬇️ Export iDoceo</button>
            <button onclick="openPurgeModal()" class="bg-zinc-800 px-6 py-3 rounded-xl font-black border-2 border-zinc-600 uppercase text-xs text-white active:bg-zinc-700">⚙️ Purge / Reset</button>
        </div>
    </header>

    <nav class="flex border-b border-zinc-800 mb-6 font-bold text-xs uppercase tracking-widest overflow-x-auto">
        <button id="btnTab1" onclick="switchTab('classes')" class="px-6 py-4 tab-active whitespace-nowrap">👨‍🎓 Classes</button>
        <button id="btnTab2" onclick="switchTab('config')" class="px-6 py-4 text-zinc-500 whitespace-nowrap">⚙️ Circuits</button>
        <button id="btnTab3" onclick="switchTab('live')" class="px-6 py-4 text-zinc-500 whitespace-nowrap">📊 Résultats Live</button>
    </nav>

    <div id="viewClasses" class="space-y-4">
        <div class="bg-zinc-900 p-4 rounded-3xl flex flex-wrap gap-4 items-center justify-between border-2 border-zinc-800">
            <div class="flex items-center gap-2">
                <select id="selectClasse" onchange="changeClasse(this.value)" class="bg-black p-3 rounded-xl font-bold text-white border-2 border-zinc-700"></select>
                <button onclick="addCl()" class="bg-blue-600 px-5 py-3 rounded-xl font-black border-2 border-blue-400 active:scale-95 transition-transform">+</button>
                <button onclick="autoAssignCodes()" class="bg-purple-600 px-4 py-3 rounded-xl font-black border-2 border-purple-500 uppercase text-xs text-white active:scale-95 transition-transform">🔀 Auto-Codes</button>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('csvEleves').click()" class="bg-black border-2 border-zinc-600 px-4 py-3 rounded-lg text-xs uppercase font-bold text-white active:bg-zinc-800">📂 Import iDoceo</button>
                <input type="file" id="csvEleves" accept=".csv" class="hidden">
            </div>
        </div>
        <div id="eleveList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3"></div>
    </div>

    <div id="viewConfig" class="hidden space-y-6">
        <div class="bg-zinc-900 p-8 rounded-[2rem] border-2 border-zinc-800">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="font-black text-blue-400 uppercase text-lg italic">Catégories de Parcours</h3>
                    <p class="text-xs text-zinc-500 mt-1 font-bold">Imposez la catégorie active pour la classe en cours d'un simple clic.</p>
                </div>
                <button onclick="addCircuit()" class="bg-blue-600 px-6 py-3 rounded-xl font-black text-xs border-2 border-blue-400 text-white active:scale-95 transition-transform">+ NOUVEAU CIRCUIT</button>
            </div>
            <div id="circuitList" class="space-y-4 mb-6"></div>
            <div class="pt-6 border-t border-zinc-800 flex items-center gap-4">
                <span class="text-xs font-black uppercase text-white">Validation Élève :</span>
                <select id="valMode" onchange="updateSettings()" class="bg-black text-sm p-4 rounded-xl font-bold border-2 border-zinc-700 text-white outline-none">
                    <option value="step">Directe (Immédiate)</option>
                    <option value="final">À la fin du carton</option>
                </select>
            </div>
        </div>
    </div>

    <div id="viewLive" class="hidden">
        <div id="resultGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>

    <div id="modalAttr" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 p-8 rounded-[3rem] border-4 border-zinc-700 w-full max-w-md">
            <h3 class="text-center font-black uppercase mb-6 text-blue-400 text-xl italic">Code Équipe</h3>
            <div class="grid grid-cols-6 gap-3 mb-6">
                <script>
                    ["A","B","C","D","E","F"].forEach(g => {
                        document.write(`<div class="flex flex-col gap-3">`);
                        for(let i=1; i<=6; i++) {
                            document.write(`<button onclick="confirmAttr('${g}${i}')" class="bg-black py-4 rounded-2xl font-black text-sm border-2 border-zinc-700 text-white active:bg-blue-600 transition-colors">${g}${i}</button>`);
                        }
                        document.write(`</div>`);
                    });
                </script>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6 pt-6 border-t border-zinc-800">
                <button onclick="confirmAttr('ABS')" class="bg-red-900/30 py-4 rounded-2xl font-black text-sm border-2 border-red-800 text-red-400 active:bg-red-800 transition-colors">ABSENT</button>
                <button onclick="confirmAttr('INAPTE')" class="bg-orange-900/30 py-4 rounded-2xl font-black text-sm border-2 border-orange-800 text-orange-400 active:bg-orange-800 transition-colors">INAPTE</button>
                <button onclick="confirmAttr('')" class="bg-zinc-800 col-span-2 py-4 rounded-2xl font-black text-sm border-2 border-zinc-600 text-zinc-400 active:bg-zinc-700 transition-colors">EFFACER LE CODE</button>
            </div>
            <button onclick="closeModal('modalAttr')" class="w-full py-4 text-xs font-black uppercase border-2 border-zinc-700 rounded-xl active:bg-zinc-800 transition-colors">Fermer</button>
        </div>
    </div>

    <div id="modalCarton" class="hidden fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 p-8 rounded-[3rem] border-4 border-zinc-700 w-full max-w-lg max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
                <div>
                    <h3 id="cartonName" class="font-black uppercase text-blue-400 text-2xl italic">Nom</h3>
                    <button id="btnEditMode" onclick="toggleEditMode()" class="mt-2 text-xs font-bold text-zinc-500 bg-black px-3 py-1 rounded-full border border-zinc-700">🔒 Verrouillé</button>
                </div>
                <span id="cartonScore" class="bg-blue-600 text-white px-4 py-2 rounded-full font-black text-xl">0/0</span>
            </div>
            <div id="cartonDetails" class="space-y-4 overflow-y-auto flex-1 pr-2"></div>
            <button onclick="closeModal('modalCarton')" class="w-full mt-6 py-4 text-xs font-black uppercase border-2 border-zinc-700 rounded-xl bg-black active:bg-zinc-800">Fermer</button>
        </div>
    </div>

    <div id="modalPurge" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-zinc-900 p-8 rounded-[3rem] border-4 border-zinc-800 w-full max-w-lg shadow-2xl">
            <h3 class="text-center font-black uppercase mb-6 text-zinc-300 text-2xl italic">
                <span onclick="secretPurgeAll()" class="cursor-pointer active:scale-90 inline-block transition-transform">⚙️</span> Options de Purge
            </h3>
            <div class="space-y-3">
                <button onclick="executePurge('scores_active')" class="w-full bg-black border-2 border-zinc-700 p-4 rounded-2xl text-left active:border-orange-500 transition-colors">
                    <span class="block font-black text-orange-400 uppercase">1. Vider les scores de cette classe (<span id="lblPurgeCl1"></span>)</span>
                    <span class="text-[10px] text-zinc-500 font-bold">Conserve les élèves. Remet chronos et parcours à zéro.</span>
                </button>
                <button onclick="executePurge('class_active')" class="w-full bg-black border-2 border-zinc-700 p-4 rounded-2xl text-left active:border-red-500 transition-colors">
                    <span class="block font-black text-red-400 uppercase">2. Supprimer la classe active (<span id="lblPurgeCl2"></span>)</span>
                </button>
                
                <button id="btnPurgeAll" onclick="executePurge('all')" class="hidden w-full bg-red-950/40 border-2 border-red-800 p-4 rounded-2xl text-left active:bg-red-600 transition-colors mt-6">
                    <span class="block font-black text-red-400 uppercase text-center tracking-widest">⚠️ PURGE TOTALE BASE ENSEIGNANT</span>
                    <span class="block text-[9px] text-center text-red-600 font-bold mt-1">Efface l'intégralité des classes et de l'historique de l'établissement.</span>
                </button>
            </div>
            <button onclick="closeModal('modalPurge')" class="w-full mt-8 py-4 text-xs font-black uppercase border-2 border-zinc-700 rounded-xl bg-black active:bg-zinc-800 font-bold">Annuler</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://co-balises-numeriques-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database();

        let state = {
            classes: JSON.parse(localStorage.getItem('co_pro_classes')) || { "305": [] },
            activeCl: localStorage.getItem('co_pro_active') || "305",
            circuits: [], 
            valMode: 'step', 
            targetIdx: null,
            startT: 0, 
            stopT: 0, 
            lastLiveSnap: {},
            editMode: false, 
            currentCode: "", 
            activeCat: ""
        };

        let purgeClicks = 0;
        let purgeTimer;

        function openPurgeModal() {
            purgeClicks = 0;
            document.getElementById('lblPurgeCl1').innerText = state.activeCl;
            document.getElementById('lblPurgeCl2').innerText = state.activeCl;
            document.getElementById('btnPurgeAll').classList.add('hidden');
            document.getElementById('modalPurge').classList.remove('hidden');
        }

        function secretPurgeAll() {
            purgeClicks++; 
            clearTimeout(purgeTimer);
            purgeTimer = setTimeout(() => { purgeClicks = 0; }, 500);
            if(purgeClicks === 3) {
                document.getElementById('btnPurgeAll').classList.remove('hidden');
                alert("🔓 Option de purge globale débloquée.");
            }
        }

        function init() {
            updateClSelect(); 
            renderEleves();
            
            db.ref('settings/config').on('value', snap => {
                const c = snap.val() || {};
                state.circuits = c.circuits ? Object.values(c.circuits) : [];
                state.valMode = c.valMode || 'step';
                if(document.getElementById('valMode')) {
                    document.getElementById('valMode').value = state.valMode;
                }
                renderCircuits();
            });
            
            db.ref('sessions').on('value', snap => {
                state.lastLiveSnap = snap.val() || {}; 
                renderLive();
                if(!document.getElementById('modalCarton').classList.contains('hidden') && state.currentCode) {
                    openDetails(document.getElementById('cartonName').innerText, state.currentCode, true);
                }
            });

            setupClasseListeners(state.activeCl); 
            saveAndSync();
        }

        function setupClasseListeners(className) {
            if(state.oldCl) {
                db.ref(`settings/startTime/${state.oldCl}`).off();
                db.ref(`settings/endTime/${state.oldCl}`).off();
                db.ref(`settings/activeCategory/${state.oldCl}`).off();
            }
            
            db.ref(`settings/startTime/${className}`).on('value', s => { 
                state.startT = s.val(); 
                db.ref(`settings/endTime/${className}`).on('value', e => { 
                    state.stopT = e.val(); 
                    updateChronoUI(); 
                });
            });

            db.ref(`settings/activeCategory/${className}`).on('value', snap => {
                state.activeCat = snap.val() || "";
                renderCircuits();
            });

            state.oldCl = className;
        }

        function activateCategory(catName) {
            db.ref(`settings/activeCategory/${state.activeCl}`).set(catName);
        }

        function exportiDoceo() {
            if (!state.activeCl || !state.classes[state.activeCl] || state.classes[state.activeCl].length === 0) {
                return alert("Aucune donnée.");
            }
            const session = state.lastLiveSnap[state.activeCl] || {};
            let resultats = [];
            
            state.classes[state.activeCl].forEach(e => {
                let ptsTotal = "", balisesTotal = "", note = "", temps = "";
                
                if (e.code && session[e.code] && e.code !== 'ABS' && e.code !== 'INAPTE') {
                    ptsTotal = 0; 
                    balisesTotal = 0; 
                    temps = 0;
                    
                    Object.values(session[e.code]).forEach(circ => {
                        ptsTotal += circ.pts || 0; 
                        balisesTotal += circ.total || 0;
                        if(circ.time && circ.time > temps) temps = circ.time;
                    });
                    
                    if (balisesTotal > 0) {
                        note = ((ptsTotal / balisesTotal) * 20).toFixed(1).replace('.', ',');
                    }
                }
                
                resultats.push({ 
                    nomComplet: `${e.prenom} ${e.nom}`, 
                    code: e.code, 
                    pts: ptsTotal, 
                    max: balisesTotal, 
                    note: note, 
                    tempsSec: temps || 999999, 
                    tempsStr: formatTime(temps) 
                });
            });

            resultats.sort((a, b) => {
                if (a.pts === "" && b.pts === "") return 0; 
                if (a.pts === "") return 1; 
                if (b.pts === "") return -1;
                if (b.pts !== a.pts) return b.pts - a.pts; 
                return a.tempsSec - b.tempsSec;
            });

            let csv = "\uFEFF\"Rang\",\"Equipe\",\"Score\",\"Balises Visees\",\"Note /20\",\"Temps\"\n";
            resultats.forEach((r, idx) => {
                let rang = (r.pts !== "" && r.code !== 'ABS' && r.code !== 'INAPTE') ? (idx + 1) : "";
                let timeExport = r.tempsSec === 999999 ? "" : r.tempsStr;
                csv += `"${rang}","${r.nomComplet}","${r.pts}","${r.max}","${r.note}","${timeExport}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); 
            link.href = URL.createObjectURL(blob);
            link.download = `CO_Logic_${state.activeCl}.csv`; 
            link.click();
        }

        function formatTime(s) { 
            if(!s) return ""; 
            const min = Math.floor(s/60); 
            const sec = s%60; 
            return `${min}:${sec < 10 ? '0' : ''}${sec}`; 
        }

        function saveAndSync() { 
            localStorage.setItem('co_pro_classes', JSON.stringify(state.classes)); 
            localStorage.setItem('co_pro_active', state.activeCl); 
            renderEleves(); 
            
            db.ref('settings/classesNames').once('value', snap => { 
                let online = snap.val() || []; 
                let local = Object.keys(state.classes); 
                db.ref('settings/classesNames').set([...new Set([...online, ...local])]); 
            }); 
        }

        function updateSettings() { 
            db.ref('settings/config').set({ circuits: state.circuits, valMode: document.getElementById('valMode').value }); 
        }

        function toggleChrono() { 
            if(!state.activeCl) return; 
            
            if(!state.startT) {
                db.ref(`settings/startTime/${state.activeCl}`).set(Date.now()); 
            } else if(!state.stopT) { 
                if(confirm("Arrêter la séance ?")) {
                    db.ref(`settings/endTime/${state.activeCl}`).set(Date.now()); 
                }
            } else { 
                if(confirm("Réinitialiser le chrono de cette classe ?")) { 
                    db.ref(`settings/startTime/${state.activeCl}`).remove(); 
                    db.ref(`settings/endTime/${state.activeCl}`).remove(); 
                } 
            } 
        }

        function updateChronoUI() { 
            const btn = document.getElementById('btnChrono');
            const disp = document.getElementById('chronoDisplay'); 
            
            if(!state.startT) { 
                btn.innerText = "🚀 TOP DÉPART"; 
                btn.className = "bg-emerald-600 px-8 py-3 rounded-full border-4 border-emerald-400 font-black text-white active:scale-95 transition-transform animate-pulse"; 
                disp.classList.add('hidden'); 
            } else if(!state.stopT) { 
                btn.innerText = "🛑 STOP SÉANCE"; 
                btn.className = "bg-red-600 px-8 py-3 rounded-full border-4 border-red-400 font-black text-white active:scale-95 transition-transform"; 
                disp.classList.remove('hidden'); 
                clearInterval(window.it); 
                window.it = setInterval(() => { 
                    const s = Math.floor((Date.now() - state.startT) / 1000); 
                    disp.innerText = new Date(s * 1000).toISOString().substring(14, 19); 
                }, 1000); 
            } else { 
                btn.innerText = "⏱️ TERMINÉ"; 
                btn.className = "bg-zinc-700 px-8 py-3 rounded-full border-4 border-zinc-500 font-black text-white active:scale-95 transition-transform"; 
                disp.classList.remove('hidden'); 
                clearInterval(window.it); 
            } 
        }

        function changeClasse(val) { 
            state.activeCl = val; 
            localStorage.setItem('co_pro_active', val); 
            renderEleves(); 
            renderLive(); 
            setupClasseListeners(val); 
        }

        function openAttr(idx) { 
            state.targetIdx = idx; 
            document.getElementById('modalAttr').classList.remove('hidden'); 
        }

        function confirmAttr(code) { 
            state.classes[state.activeCl][state.targetIdx].code = code; 
            saveAndSync(); 
            closeModal('modalAttr'); 
        }

        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
        }

        function addCl() { 
            const n = prompt("Nom de la classe ?"); 
            if(n) {
                state.classes[n] = []; 
                state.activeCl = n; 
                updateClSelect(); 
                saveAndSync(); 
                setupClasseListeners(n);
            } 
        }

        function updateClSelect() { 
            document.getElementById('selectClasse').innerHTML = Object.keys(state.classes).map(c => 
                `<option value="${c}" ${c === state.activeCl ? 'selected' : ''}>${c}</option>`
            ).join(''); 
        }

        function executePurge(type) {
            if (prompt("Code Sécurité RNE :") !== "0680013V") return;
            
            if (type === 'scores_active') { 
                db.ref(`sessions/${state.activeCl}`).remove(); 
                db.ref(`settings/startTime/${state.activeCl}`).remove(); 
                db.ref(`settings/endTime/${state.activeCl}`).remove(); 
                db.ref(`settings/activeCategory/${state.activeCl}`).remove(); 
            } else if (type === 'class_active') { 
                db.ref(`sessions/${state.activeCl}`).remove(); 
                db.ref(`settings/startTime/${state.activeCl}`).remove(); 
                db.ref(`settings/endTime/${state.activeCl}`).remove(); 
                db.ref(`settings/activeCategory/${state.activeCl}`).remove();
                
                db.ref('settings/classesNames').once('value', snap => { 
                    let online = (snap.val() || []).filter(c => c !== state.activeCl); 
                    db.ref('settings/classesNames').set(online); 
                    delete state.classes[state.activeCl]; 
                    state.activeCl = Object.keys(state.classes)[0] || ""; 
                    saveAndSync(); 
                    location.reload(); 
                }); 
                return;
            } else if (type === 'all') { 
                db.ref().remove(); 
                localStorage.clear(); 
                location.reload(); 
            }
            closeModal('modalPurge');
        }

        document.getElementById('csvEleves').addEventListener('change', function(e) {
            Papa.parse(e.target.files[0], { 
                header: true, 
                skipEmptyLines: true, 
                complete: res => {
                    const f = res.meta.fields;
                    const cn = f.find(x => x.toLowerCase().includes('nom') || x.toLowerCase() === '@lastname');
                    const cp = f.find(x => x.toLowerCase().includes('prénom') || x.toLowerCase() === '@name' || x.toLowerCase() === 'prenom');
                    const cl = prompt("Nom de la classe ?"); 
                    
                    if(!cl) return;
                    
                    let eleves = res.data.filter(r => r[cn]).map(r => ({ 
                        nom: r[cn].trim(), 
                        prenom: r[cp] ? r[cp].trim() : "", 
                        code: '' 
                    }));
                    
                    eleves.sort((a, b) => a.nom.localeCompare(b.nom)); 
                    state.classes[cl] = eleves; 
                    state.activeCl = cl; 
                    
                    updateClSelect(); 
                    saveAndSync(); 
                    setupClasseListeners(cl); 
                    e.target.value = '';
                }
            });
        });

        function autoAssignCodes() { 
            if(!state.activeCl || !confirm("Auto-assigner les codes pour la " + state.activeCl + " ?")) return; 
            
            let eleves = state.classes[state.activeCl]; 
            eleves.sort((a, b) => a.nom.localeCompare(b.nom)); 
            
            const codesDispo = []; 
            ["A","B","C","D","E","F"].forEach(l => { 
                for(let i=1; i<=6; i++) codesDispo.push(l+i); 
            }); 
            
            eleves.forEach((el, idx) => { 
                if (idx < codesDispo.length) el.code = codesDispo[idx]; 
            }); 
            
            saveAndSync(); 
        }

        function addCircuit() { 
            const cat = prompt("Catégorie (ex: Forêt, Étoiles) :"); 
            if(!cat) return; 
            
            const nom = prompt("Nom du circuit (ex: 1, Rouge) :"); 
            if(!nom) return; 
            
            const b = prompt("Liste des balises (ex: 31, 34*, 42) :"); 
            if(b) { 
                if(!Array.isArray(state.circuits)) state.circuits = Object.values(state.circuits || {}); 
                state.circuits.push({ 
                    id: Date.now(), 
                    cat: cat.trim(), 
                    nom: nom.trim(), 
                    balises: b.split(',').map(x => x.trim()) 
                }); 
                updateSettings(); 
            } 
        }

        function delCircuit(id) { 
            if(confirm("Supprimer ce circuit ?")) { 
                state.circuits = state.circuits.filter(c => c.id !== id); 
                updateSettings(); 
            } 
        }

        function delCat(catName) { 
            if(confirm("Supprimer toute la catégorie " + catName + " ?")) { 
                state.circuits = state.circuits.filter(c => c.cat !== catName); 
                updateSettings(); 
            } 
        }

        function renderEleves() { 
            const listContainer = document.getElementById('eleveList');
            if(!listContainer) return;
            
            listContainer.innerHTML = (state.classes[state.activeCl] || []).map((e, i) => { 
                let rowClass = ""; 
                if(e.code === 'ABS') rowClass = "row-ABS"; 
                else if(e.code === 'INAPTE') rowClass = "row-INAPTE"; 
                else if(e.code) rowClass = "row-" + e.code[0]; 
                
                return `
                <div onclick="openAttr(${i})" class="bg-zinc-900 p-4 rounded-3xl border-2 border-zinc-800 cursor-pointer transition-transform active:scale-95 ${rowClass}">
                    <p class="text-sm font-black text-zinc-300 uppercase truncate">${e.prenom}</p>
                    <p class="text-sm font-black uppercase truncate text-white mb-2">${e.nom}</p>
                    <div class="bg-black p-2 rounded-xl border border-zinc-800 text-center text-2xl font-black text-blue-500 italic">${e.code || '--'}</div>
                </div>`; 
            }).join(''); 
        }

        function renderCircuits() {
            const grouped = {}; 
            state.circuits.forEach(c => { 
                const cat = c.cat || "Général"; 
                if(!grouped[cat]) grouped[cat] = []; 
                grouped[cat].push(c); 
            });
            
            let html = "";
            for(let cat in grouped) {
                const isActive = (cat === state.activeCat);
                const actionBtn = isActive ? 
                    `<span class="bg-emerald-600 text-white text-[10px] px-3 py-1.5 rounded-full font-black animate-pulse border border-emerald-400">🎯 ACTIF POUR LA ${state.activeCl}</span>` : 
                    `<button onclick="activateCategory('${cat}')" class="bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-[10px] font-black uppercase px-3 py-1.5 rounded-xl text-zinc-300">🎯 Activer pour la ${state.activeCl}</button>`;

                html += `
                <div class="bg-black p-5 rounded-[2rem] border-2 ${isActive ? 'border-emerald-600/40' : 'border-zinc-800'} mb-4">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-zinc-900">
                        <h4 class="font-black text-white text-lg uppercase tracking-wider">${cat}</h4>
                        <div class="flex items-center gap-3">
                            ${actionBtn}
                            <button onclick="delCat('${cat}')" class="text-red-600 text-[10px] font-bold uppercase">Suppr. Cat</button>
                        </div>
                    </div>
                    <div class="space-y-2">`;
                
                grouped[cat].forEach(c => {
                    html += `
                    <div class="bg-zinc-900/60 p-3 rounded-xl flex justify-between items-center border border-zinc-800/60">
                        <span class="font-black text-blue-400 text-sm">Circuit ${c.nom} <span class="text-zinc-500 font-normal ml-2 italic">${(c.balises||[]).join(' ➔ ')}</span></span>
                        <button onclick="delCircuit(${c.id})" class="text-red-500 text-[10px] bg-red-950/20 px-2 py-1 rounded">Suppr.</button>
                    </div>`;
                });
                
                html += `</div></div>`;
            }
            document.getElementById('circuitList').innerHTML = html;
        }

        function renderLive() { 
            const cont = document.getElementById('resultGrid'); 
            if(!cont) return; 
            
            const sess = state.lastLiveSnap[state.activeCl] || {}; 
            
            cont.innerHTML = (state.classes[state.activeCl] || []).map(e => { 
                if(!e.code) return ""; 
                
                if(e.code === 'ABS' || e.code === 'INAPTE') { 
                    let badgeColor = e.code === 'ABS' ? 'text-red-400 border-red-800 bg-red-900/30' : 'text-orange-400 border-orange-800 bg-orange-900/30'; 
                    return `
                    <div class="bg-zinc-900/50 p-5 rounded-[2rem] border-2 border-zinc-800 shadow-xl opacity-60 flex flex-col justify-between">
                        <div>
                            <p class="text-sm font-black text-zinc-500 uppercase truncate">${e.prenom}</p>
                            <p class="text-sm font-black uppercase truncate text-zinc-400">${e.nom}</p>
                        </div>
                        <div class="mt-4 flex justify-end">
                            <span class="${badgeColor} border-2 px-3 py-1 rounded-lg font-black text-xs italic">${e.code}</span>
                        </div>
                    </div>`; 
                } 
                
                const sObj = sess[e.code] || {}; 
                let pts = 0, tot = 0; 
                
                Object.values(sObj).forEach(c => { 
                    pts += c.pts || 0; 
                    tot += c.total || 0; 
                }); 
                
                return `
                <div onclick="openDetails('${e.nom} ${e.prenom}', '${e.code}')" class="bg-zinc-900 p-5 rounded-[2rem] border-2 border-zinc-800 shadow-xl cursor-pointer active:border-blue-500 transition-colors">
                    <p class="text-sm font-black text-zinc-300 uppercase truncate">${e.prenom}</p>
                    <p class="text-sm font-black uppercase truncate text-white">${e.nom}</p>
                    <div class="flex justify-between items-end mt-4">
                        <span class="text-blue-400 font-black text-4xl italic">${pts}<span class="text-xl text-zinc-600">/${tot || '-'}</span></span>
                        <span class="bg-black border border-zinc-700 text-white px-3 py-1 rounded-lg font-black text-xs italic">${e.code}</span>
                    </div>
                </div>`; 
            }).join(''); 
        }

        function toggleEditMode() { 
            state.editMode = !state.editMode; 
            const btn = document.getElementById('btnEditMode'); 
            
            if(state.editMode) { 
                btn.innerText = "🔓 Édition Active"; 
                btn.className = "mt-2 text-xs font-bold text-white bg-red-600 px-3 py-1 rounded-full animate-pulse shadow-lg"; 
            } else { 
                btn.innerText = "🔒 Verrouillé"; 
                btn.className = "mt-2 text-xs font-bold text-zinc-500 bg-black px-3 py-1 rounded-full border border-zinc-700"; 
            } 
            
            if(state.currentCode) {
                openDetails(document.getElementById('cartonName').innerText, state.currentCode, true);
            }
        }

        function openDetails(name, code, isRefresh = false) {
            state.currentCode = code; 
            
            if(!isRefresh) { 
                state.editMode = false; 
                document.getElementById('btnEditMode').innerText = "🔒 Verrouillé"; 
                document.getElementById('btnEditMode').className = "mt-2 text-xs font-bold text-zinc-500 bg-black px-3 py-1 rounded-full border border-zinc-700"; 
            }
            
            document.getElementById('cartonName').innerText = name; 
            const sess = (state.lastLiveSnap[state.activeCl] || {})[code] || {}; 
            let pt = 0, tt = 0; 
            let html = "";
            
            Object.keys(sess).forEach(ck => {
                const d = sess[ck]; 
                pt += d.pts; 
                tt += d.total; 
                html += `<div class="text-xs font-black text-zinc-500 mb-2 uppercase border-b border-zinc-800 pb-1">${ck}</div>`;
                
                (d.details || []).forEach((det, i) => {
                    let cls = det.status === "correct" ? "case-correct" : (det.status === "wrong" ? "case-wrong" : "case-empty");
                    
                    let btnForce = (state.editMode && det.status !== "correct") ? 
                        `<button onclick="forcePunch('${code}', '${ck}', ${i}, ${d.pts})" class="ml-4 bg-red-600 text-white text-[10px] uppercase font-black px-3 py-2 rounded-lg active:scale-95">✅ Forcer</button>` : "";
                    
                    html += `
                    <div class="bg-black p-4 rounded-2xl flex items-center justify-between border-2 border-zinc-800 mb-2">
                        <div class="flex items-center">
                            <span class="text-xs font-black text-zinc-400">Poste ${i+1} (Balise ${det.balise})</span>
                            ${btnForce}
                        </div>
                        <div class="text-xl font-black rounded-xl px-6 py-2 ${cls}">${det.userCode || "---"}</div>
                    </div>`;
                });
            });
            
            document.getElementById('cartonScore').innerText = `${pt} / ${tt}`; 
            document.getElementById('cartonDetails').innerHTML = html; 
            document.getElementById('modalCarton').classList.remove('hidden');
        }

        function forcePunch(code, circuitKey, posteIdx, currentPts) { 
            if(!confirm("Accorder le point ?")) return; 
            
            const updates = {}; 
            updates[`sessions/${state.activeCl}/${code}/${circuitKey}/details/${posteIdx}/status`] = "correct"; 
            updates[`sessions/${state.activeCl}/${code}/${circuitKey}/details/${posteIdx}/userCode`] = "FORCÉ"; 
            updates[`sessions/${state.activeCl}/${code}/${circuitKey}/pts`] = currentPts + 1; 
            
            db.ref().update(updates); 
        }

        function switchTab(t) { 
            ['viewClasses','viewConfig','viewLive'].forEach(v => document.getElementById(v).classList.add('hidden')); 
            ['btnTab1','btnTab2','btnTab3'].forEach(b => document.getElementById(b).classList.remove('tab-active','text-blue-500')); 
            
            document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden'); 
            document.getElementById('btnTab'+(t==='classes'?'1':t==='config'?'2':'3')).classList.add('tab-active'); 
        }

        init();
    </script>
</body>
</html>
