<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master | CO-Logic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .row-A { border-left: 8px solid #ef4444; background: rgba(239, 68, 68, 0.05); } 
        .row-B { border-left: 8px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .row-C { border-left: 8px solid #22c55e; background: rgba(34, 197, 94, 0.05); } 
        .row-D { border-left: 8px solid #eab308; background: rgba(234, 179, 8, 0.05); }
        .row-E { border-left: 8px solid #a855f7; background: rgba(168, 85, 247, 0.05); } 
        .row-F { border-left: 8px solid #ec4899; background: rgba(236, 72, 153, 0.05); }
        .select-num { background: white; color: black; font-weight: 900; border-radius: 8px; padding: 5px; border: 2px solid #3b82f6; text-align: center; }
    </style>
</head>
<body class="bg-slate-950 text-white p-4">

    <header class="flex justify-between items-center mb-6 px-2">
        <h1 class="text-2xl font-black text-blue-500 uppercase italic">CO-Logic Master</h1>
        <div class="flex gap-2">
            <button onclick="exportCSV()" class="bg-green-600 px-4 py-2 rounded-xl font-bold uppercase text-[10px]">Export iDoceo</button>
            <button onclick="resetScores()" class="bg-red-600 px-4 py-2 rounded-xl font-bold uppercase text-[10px]">Vider Base</button>
        </div>
    </header>

    <nav class="flex border-b border-slate-800 mb-6 font-bold text-[10px] uppercase tracking-widest overflow-x-auto">
        <button id="btnTab1" onclick="switchTab('classes')" class="px-6 py-4 tab-active whitespace-nowrap">👨‍🎓 Attribution</button>
        <button id="btnTab2" onclick="switchTab('config')" class="px-6 py-4 text-slate-500 whitespace-nowrap">⚙️ Configuration</button>
        <button id="btnTab3" onclick="switchTab('live')" class="px-6 py-4 text-slate-500 whitespace-nowrap">📊 Résultats</button>
    </nav>

    <div id="viewClasses" class="space-y-4">
        <div class="bg-slate-900 p-4 rounded-3xl flex flex-wrap gap-4 items-center justify-between border border-slate-800 shadow-xl">
            <div class="flex items-center gap-2">
                <select id="selectClasse" onchange="changeClasse(this.value)" class="bg-slate-800 p-2 rounded-xl font-bold text-white"></select>
                <button onclick="addCl()" class="bg-blue-600 px-4 py-2 rounded-xl font-black">+</button>
            </div>
            <input type="file" id="csvEleves" class="text-[10px] text-slate-500">
        </div>
        <div id="eleveList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3"></div>
    </div>

    <div id="modalAttr" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-slate-900 p-8 rounded-[3rem] border border-slate-700 w-full max-w-md shadow-2xl">
            <h3 id="attrTitle" class="text-center font-black uppercase mb-8 text-blue-400 text-xl italic">Attribuer Équipe</h3>
            <div class="grid grid-cols-6 gap-3">
                <script>
                    ["A","B","C","D","E","F"].forEach(g => {
                        document.write(`<div class="flex flex-col gap-3">`);
                        for(let i=1; i<=6; i++) {
                            document.write(`<button onclick="confirmAttr('${g}${i}')" class="bg-slate-800 py-5 rounded-2xl font-black text-sm hover:bg-blue-600 transition-all border border-white/5 shadow-lg active:scale-90">${g}${i}</button>`);
                        }
                        document.write(`</div>`);
                    });
                </script>
            </div>
            <button onclick="closeModal()" class="w-full mt-10 py-3 text-[10px] font-black opacity-30 uppercase tracking-[0.3em]">Fermer</button>
        </div>
    </div>

    <div id="viewConfig" class="hidden space-y-6">
        <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-xl">
            <h3 class="font-black text-blue-400 uppercase mb-4 text-xs tracking-widest">1. Importer la matrice (Codes A1-F6)</h3>
            <input type="file" id="csvCodes" class="text-xs">
            <p id="matriceStatus" class="text-[10px] mt-4 italic opacity-50">Attente de fichier...</p>
        </div>
        <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-blue-400 uppercase text-xs tracking-widest">2. Circuits & Balises</h3>
                <button onclick="addCircuit()" class="bg-blue-600 px-4 py-2 rounded-xl font-black text-[10px] shadow-lg">+ NOUVEAU CIRCUIT</button>
            </div>
            <div id="circuitList" class="space-y-3 mb-6"></div>
            <div class="pt-6 border-t border-slate-800 flex items-center gap-4">
                <span class="text-[10px] font-black uppercase opacity-40">Validation :</span>
                <select id="valMode" onchange="updateSettings()" class="bg-slate-800 text-xs p-3 rounded-xl font-bold">
                    <option value="step">Pas à pas (Direct)</option>
                    <option value="final">Carton complet (À la fin)</option>
                </select>
            </div>
        </div>
    </div>

    <div id="viewLive" class="hidden">
        <div id="resultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://co-balises-numeriques-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = {
            classes: JSON.parse(localStorage.getItem('co_pro_classes')) || { "305": [] },
            activeCl: localStorage.getItem('co_pro_active') || "305",
            circuits: [], valMode: 'step', targetIdx: null
        };

        function init() {
            updateClSelect(); renderEleves();
            db.ref('settings/config').on('value', snap => {
                const c = snap.val() || {};
                state.circuits = c.circuits || [];
                state.valMode = c.valMode || 'step';
                if(document.getElementById('valMode')) document.getElementById('valMode').value = state.valMode;
                renderCircuits();
            });
            db.ref('settings/matrice').on('value', snap => {
                const s = document.getElementById('matriceStatus');
                if(s) s.innerText = snap.exists() ? "✅ Matrice synchronisée sur Firebase" : "❌ Matrice absente";
            });
            db.ref('sessions').on('value', snap => renderLive(snap.val() || {}));
        }

        function openAttr(idx) { state.targetIdx = idx; document.getElementById('modalAttr').classList.remove('hidden'); }
        function confirmAttr(code) {
            state.classes[state.activeCl][state.targetIdx].code = code;
            saveAndSync(); closeModal();
        }
        function closeModal() { document.getElementById('modalAttr').classList.add('hidden'); }

        document.getElementById('csvCodes').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
                const head = lines[0].split(lines[0].includes(';')?';':',').map(s=>s.trim());
                const mat = {};
                lines.slice(1).forEach(l => {
                    const p = l.split(l.includes(';')?';':',').map(s=>s.trim());
                    const b = p[0]; mat[b] = {};
                    head.slice(1).forEach((h, i) => mat[b][h] = p[i+1]);
                });
                db.ref('settings/matrice').set(mat);
                alert("Matrice importée et synchronisée !");
            };
            reader.readAsText(e.target.files[0]);
        });

        function addCircuit() {
            const b = prompt("Liste des balises séparées par des virgules (ex: 31,34,42,50) :");
            if(b) {
                state.circuits.push({ id: state.circuits.length+1, balises: b.split(',').map(x=>x.trim()) });
                updateSettings();
            }
        }
        function updateSettings() {
            db.ref('settings/config').set({ circuits: state.circuits, valMode: document.getElementById('valMode').value });
            db.ref('settings/classesNames').set(Object.keys(state.classes));
        }

        function saveAndSync() {
            localStorage.setItem('co_pro_classes', JSON.stringify(state.classes));
            localStorage.setItem('co_pro_active', state.activeCl);
            renderEleves(); updateSettings();
        }

        function renderEleves() {
            const cont = document.getElementById('eleveList');
            cont.innerHTML = (state.classes[state.activeCl] || []).map((e, i) => `
                <div onclick="openAttr(${i})" class="bg-slate-900 p-5 rounded-[1.5rem] border border-slate-800 cursor-pointer shadow-lg transition-all hover:scale-105 row-${e.code?e.code[0]:''}">
                    <p class="text-[10px] font-black uppercase opacity-30 mb-1 leading-none">${e.prenom}</p>
                    <p class="text-xs font-black uppercase truncate">${e.nom}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-2xl font-black text-blue-500 italic">${e.code || '--'}</span>
                        <span class="text-[8px] opacity-20 font-bold uppercase">Modifier</span>
                    </div>
                </div>`).join('');
        }

        function renderCircuits() {
            const l = document.getElementById('circuitList');
            if(!l) return;
            l.innerHTML = state.circuits.map((c, i) => `
                <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 flex justify-between items-center shadow-inner">
                    <span class="font-black text-blue-500 italic">CIRCUIT ${c.id} <span class="text-white font-normal ml-3 opacity-40 italic">${c.balises.join(' ➔ ')}</span></span>
                    <button onclick="state.circuits.splice(${i},1);updateSettings()" class="text-red-500 font-black uppercase text-[9px] tracking-widest">Suppr.</button>
                </div>`).join('');
        }

        function renderLive(data) {
            const cont = document.getElementById('resultGrid'); if(!cont) return; cont.innerHTML = "";
            const session = data[state.activeCl] || {};
            (state.classes[state.activeCl] || []).forEach(e => {
                if(!e.code) return;
                const score = session[e.code] || {};
                const pts = Object.values(score).reduce((a,b) => a + (b.pts || 0), 0);
                cont.innerHTML += `<div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest">${e.nom}</p>
                    <div class="flex justify-between items-end mt-2">
                        <span class="text-5xl font-black text-blue-400 italic">${pts}</span>
                        <span class="bg-blue-600/10 text-blue-500 px-3 py-1 rounded-full font-black text-xs italic">${e.code}</span>
                    </div>
                </div>`;
            });
        }

        function switchTab(t) {
            ['viewClasses','viewConfig','viewLive'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['btnTab1','btnTab2','btnTab3'].forEach(b => document.getElementById(b).classList.remove('tab-active','text-blue-500'));
            document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
            document.getElementById('btnTab'+t.slice(-1)).classList.add('tab-active');
            if(t==='live') updateBilan();
        }

        document.getElementById('csvEleves').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
                const h = lines[0].replace(/"/g,'').split(lines[0].includes(';')?';':',');
                const inNom = h.indexOf('@lastname'), inPre = h.indexOf('@name');
                const cl = prompt("Nom de la classe (ex: 305) ?");
                state.classes[cl] = lines.slice(1).map(l => {
                    const p = l.split(l.includes(';')?';':',').map(v=>v.replace(/"/g,'').trim());
                    return { nom: p[inNom], prenom: p[inPre], code: '' };
                });
                state.activeCl = cl; updateClSelect(); saveAndSync();
            };
            reader.readAsText(e.target.files[0], "ISO-8859-1");
        });

        function addCl() { const n = prompt("Nom ?"); if(n){state.classes[n]=[]; state.activeCl=n; updateClSelect(); saveAndSync();} }
        function updateClSelect() { document.getElementById('selectClasse').innerHTML = Object.keys(state.classes).map(c=>`<option value="${c}" ${c===state.activeCl?'selected':''}>${c}</option>`).join(''); }
        function resetScores() { if(prompt("Code Sécurité RNE :")==="0680013V" && confirm("Vider tous les scores ?")) db.ref('sessions').remove(); }
        
        init();
    </script>
</body>
</html>
