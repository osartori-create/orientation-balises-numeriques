<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master | CO-Logic Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CO-Logic">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .row-A { border-left: 8px solid #ef4444; background: rgba(239, 68, 68, 0.1); } 
        .row-B { border-left: 8px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .row-C { border-left: 8px solid #22c55e; background: rgba(34, 197, 94, 0.1); } 
        .row-D { border-left: 8px solid #eab308; background: rgba(234, 179, 8, 0.1); }
        .row-E { border-left: 8px solid #a855f7; background: rgba(168, 85, 247, 0.1); } 
        .row-F { border-left: 8px solid #ec4899; background: rgba(236, 72, 153, 0.1); }
        .case-correct { background-color: #16a34a !important; color: white !important; border: 4px solid #4ade80 !important; }
        .case-wrong { background-color: #991b1b !important; color: white !important; border: 4px solid #f87171 !important; text-decoration: line-through; opacity: 0.8; }
        .case-empty { background-color: white; color: #000; border: 4px solid #333; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-zinc-800 pb-4">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 uppercase italic">CO-Logic Master</h1>
            <button id="btnChrono" onclick="toggleChrono()" class="bg-emerald-600 px-6 py-3 rounded-full border-4 border-emerald-400 font-black text-white">🚀 TOP DÉPART</button>
            <div id="chronoDisplay" class="hidden text-3xl font-mono text-yellow-400 font-bold">00:00</div>
        </div>
        <div class="flex gap-2">
            <button onclick="resetScores()" class="bg-red-600 px-4 py-2 rounded-xl font-bold border-2 border-red-400 uppercase text-[10px]">Vider Scores</button>
        </div>
    </header>

    <nav class="flex border-b border-zinc-800 mb-6 font-bold text-xs uppercase tracking-widest overflow-x-auto">
        <button id="btnTab1" onclick="switchTab('classes')" class="px-6 py-4 tab-active whitespace-nowrap">👨‍🎓 Classes</button>
        <button id="btnTab2" onclick="switchTab('config')" class="px-6 py-4 text-zinc-500 whitespace-nowrap">⚙️ Circuits</button>
        <button id="btnTab3" onclick="switchTab('live')" class="px-6 py-4 text-zinc-500 whitespace-nowrap">📊 Résultats Live</button>
    </nav>

    <div id="viewClasses" class="space-y-4">
        <div class="bg-zinc-900 p-4 rounded-3xl flex flex-wrap gap-4 items-center justify-between border-2 border-zinc-800">
            <div class="flex items-center gap-2">
                <select id="selectClasse" onchange="changeClasse(this.value)" class="bg-black p-3 rounded-xl font-bold text-white border-2 border-zinc-700"></select>
                <button onclick="addCl()" class="bg-blue-600 px-5 py-3 rounded-xl font-black border-2 border-blue-400">+</button>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('csvEleves').click()" class="bg-black border-2 border-zinc-600 px-4 py-3 rounded-lg text-xs uppercase font-bold text-white">📂 Import iDoceo</button>
                <input type="file" id="csvEleves" accept=".csv" class="hidden">
            </div>
        </div>
        <div id="eleveList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3"></div>
    </div>

    <div id="modalAttr" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 p-8 rounded-[3rem] border-4 border-zinc-700 w-full max-w-md">
            <h3 class="text-center font-black uppercase mb-8 text-blue-400 text-xl italic">Code Équipe</h3>
            <div class="grid grid-cols-6 gap-3">
                <script>
                    ["A","B","C","D","E","F"].forEach(g => {
                        document.write(`<div class="flex flex-col gap-3">`);
                        for(let i=1; i<=6; i++) {
                            document.write(`<button onclick="confirmAttr('${g}${i}')" class="bg-black py-5 rounded-2xl font-black text-sm border-2 border-zinc-700 text-white active:bg-blue-600">${g}${i}</button>`);
                        }
                        document.write(`</div>`);
                    });
                </script>
            </div>
            <button onclick="closeModal('modalAttr')" class="w-full mt-10 py-4 text-xs font-black uppercase border-2 border-zinc-700 rounded-xl">Fermer</button>
        </div>
    </div>

    <div id="viewConfig" class="hidden space-y-6">
        <div class="bg-zinc-900 p-8 rounded-[2rem] border-2 border-zinc-800">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-blue-400 uppercase text-lg italic">Circuits de course</h3>
                <button onclick="addCircuit()" class="bg-blue-600 px-6 py-3 rounded-xl font-black text-xs border-2 border-blue-400 text-white">+ NOUVEAU CIRCUIT</button>
            </div>
            <div id="circuitList" class="space-y-3 mb-6"></div>
            <div class="pt-6 border-t border-zinc-800 flex items-center gap-4">
                <span class="text-xs font-black uppercase text-white">Validation Élève :</span>
                <select id="valMode" onchange="updateSettings()" class="bg-black text-sm p-4 rounded-xl font-bold border-2 border-zinc-700 text-white outline-none">
                    <option value="step">Directe (Immédiate)</option>
                    <option value="final">À la fin du carton</option>
                </select>
            </div>
        </div>
    </div>

    <div id="viewLive" class="hidden">
        <div id="resultGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>

    <div id="modalCarton" class="hidden fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 p-8 rounded-[3rem] border-4 border-zinc-700 w-full max-w-lg max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 id="cartonName" class="font-black uppercase text-blue-400 text-2xl italic">Nom</h3>
                <span id="cartonScore" class="bg-blue-600 text-white px-4 py-2 rounded-full font-black text-xl">0/0</span>
            </div>
            <div id="cartonDetails" class="space-y-4 overflow-y-auto flex-1 pr-2"></div>
            <button onclick="closeModal('modalCarton')" class="w-full mt-6 py-4 text-xs font-black uppercase border-2 border-zinc-700 rounded-xl bg-black">Fermer</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://co-balises-numeriques-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = {
            classes: JSON.parse(localStorage.getItem('co_pro_classes')) || { "305": [] },
            activeCl: localStorage.getItem('co_pro_active') || "305",
            circuits: [], valMode: 'step', targetIdx: null,
            startT: 0, stopT: 0, lastLiveSnap: {}
        };

        function init() {
            updateClSelect(); renderEleves();
            
            db.ref('settings/config').on('value', snap => {
                const c = snap.val() || {};
                state.circuits = c.circuits || [];
                state.valMode = c.valMode || 'step';
                if(document.getElementById('valMode')) document.getElementById('valMode').value = state.valMode;
                renderCircuits();
            });
            
            db.ref('sessions').on('value', snap => {
                state.lastLiveSnap = snap.val() || {};
                renderLive();
            });

            db.ref(`settings/startTime/${state.activeCl}`).on('value', s => { 
                state.startT = s.val(); 
                db.ref(`settings/endTime/${state.activeCl}`).on('value', e => { state.stopT = e.val(); updateChronoUI(); });
            });
        }

        // CHRONO
        function toggleChrono() {
            if(!state.activeCl) return alert("Choisis une classe");
            if(!state.startT) db.ref(`settings/startTime/${state.activeCl}`).set(Date.now());
            else if(!state.stopT) { if(confirm("Arrêter la course ?")) db.ref(`settings/endTime/${state.activeCl}`).set(Date.now()); }
            else { if(confirm("Relancer une nouvelle course (Purge) ?")) { db.ref(`settings/startTime/${state.activeCl}`).remove(); db.ref(`settings/endTime/${state.activeCl}`).remove(); } }
        }

        function updateChronoUI() {
            const btn = document.getElementById('btnChrono'), disp = document.getElementById('chronoDisplay');
            if(!state.startT) { btn.innerText = "🚀 TOP DÉPART"; btn.className = "bg-emerald-600 px-8 py-3 rounded-full border-4 border-emerald-400 font-black text-white animate-pulse"; disp.classList.add('hidden'); }
            else if(!state.stopT) { 
                btn.innerText = "🛑 STOP SÉANCE"; btn.className = "bg-red-600 px-8 py-3 rounded-full border-4 border-red-400 font-black text-white"; disp.classList.remove('hidden');
                clearInterval(window.it); window.it = setInterval(() => { const s = Math.floor((Date.now()-state.startT)/1000); disp.innerText = new Date(s*1000).toISOString().substr(14,5); }, 1000);
            } else { btn.innerText = "⏱️ TERMINÉ"; btn.className = "bg-zinc-700 px-8 py-3 rounded-full border-4 border-zinc-500 font-black text-white"; disp.classList.remove('hidden'); clearInterval(window.it); }
        }

        // CSV ELEVES
        document.getElementById('csvEleves').addEventListener('change', function(e) {
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    const fields = results.meta.fields;
                    const colNom = fields.find(f => f.toLowerCase().includes('name') || f.toLowerCase().includes('nom') || f.toLowerCase() === '@lastname');
                    const colPre = fields.find(f => f.toLowerCase().includes('first') || f.toLowerCase().includes('prénom') || f.toLowerCase().includes('prenom') || f.toLowerCase() === '@name');
                    const cl = prompt("Nom de la classe (ex: 305) ?");
                    if(!cl) return;
                    state.classes[cl] = results.data.filter(r => r[colNom]).map(r => ({ nom: r[colNom], prenom: r[colPre] || "", code: '' }));
                    state.activeCl = cl; updateClSelect(); saveAndSync();
                }
            });
        });

        // UI CLASSES
        function openAttr(idx) { state.targetIdx = idx; document.getElementById('modalAttr').classList.remove('hidden'); }
        function confirmAttr(code) { state.classes[state.activeCl][state.targetIdx].code = code; saveAndSync(); closeModal('modalAttr'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function changeClasse(val) { state.activeCl = val; localStorage.setItem('co_pro_active', val); renderEleves(); renderLive(); updateChronoUI(); }
        function addCl() { const n = prompt("Nom ?"); if(n){state.classes[n]=[]; state.activeCl=n; updateClSelect(); saveAndSync();} }
        function updateClSelect() { document.getElementById('selectClasse').innerHTML = Object.keys(state.classes).map(c=>`<option value="${c}" ${c===state.activeCl?'selected':''}>${c}</option>`).join(''); }

        // UI CIRCUITS
        function addCircuit() {
            const b = prompt("Liste des balises séparées par des virgules (ex: 31,34,42,50) :");
            if(b) { state.circuits.push({ id: state.circuits.length+1, balises: b.split(',').map(x=>x.trim()) }); updateSettings(); }
        }
        function updateSettings() {
            db.ref('settings/config').set({ circuits: state.circuits, valMode: document.getElementById('valMode').value });
            db.ref('settings/classesNames').set(Object.keys(state.classes));
        }
        function saveAndSync() { localStorage.setItem('co_pro_classes', JSON.stringify(state.classes)); localStorage.setItem('co_pro_active', state.activeCl); renderEleves(); updateSettings(); }

        function renderEleves() {
            const cont = document.getElementById('eleveList');
            cont.innerHTML = (state.classes[state.activeCl] || []).map((e, i) => `
                <div onclick="openAttr(${i})" class="bg-zinc-900 p-4 rounded-3xl border-2 border-zinc-800 cursor-pointer transition-transform hover:scale-105 row-${e.code?e.code[0]:''}">
                    <p class="text-[10px] font-black uppercase text-zinc-500 leading-none truncate">${e.prenom}</p>
                    <p class="text-sm font-black uppercase truncate text-white mb-2">${e.nom}</p>
                    <div class="flex justify-between items-center bg-black p-2 rounded-xl border border-zinc-800">
                        <span class="text-2xl font-black text-blue-500 italic leading-none">${e.code || '--'}</span>
                    </div>
                </div>`).join('');
        }

        function renderCircuits() {
            const l = document.getElementById('circuitList'); if(!l) return;
            l.innerHTML = state.circuits.map((c, i) => `
                <div class="bg-black p-5 rounded-2xl border-2 border-zinc-800 flex justify-between items-center">
                    <span class="font-black text-blue-500 text-lg italic">CIRCUIT ${c.id} <span class="text-zinc-500 font-normal ml-3 italic">${c.balises.join(' ➔ ')}</span></span>
                    <button onclick="state.circuits.splice(${i},1);updateSettings()" class="text-red-500 font-black uppercase text-xs border border-red-500/30 px-3 py-2 rounded-lg">Supprimer</button>
                </div>`).join('');
        }

        // RÉSULTATS LIVE ET MODAL DÉTAILS
        function renderLive() {
            const cont = document.getElementById('resultGrid'); if(!cont) return; cont.innerHTML = "";
            const session = state.lastLiveSnap[state.activeCl] || {};
            
            (state.classes[state.activeCl] || []).forEach((e, idx) => {
                if(!e.code) return;
                const scoreObj = session[e.code] || {};
                let ptsTotal = 0, balisesTotal = 0;
                
                // On consolide les points de tous les circuits validés
                Object.values(scoreObj).forEach(circ => {
                    ptsTotal += circ.pts || 0;
                    balisesTotal += circ.total || 0;
                });

                // Couleur dynamique (vert si 100%, sinon bleu)
                const colorC = (balisesTotal > 0 && ptsTotal === balisesTotal) ? 'text-green-400' : 'text-blue-400';

                cont.innerHTML += `<div onclick="openDetails('${e.nom} ${e.prenom}', '${e.code}')" class="bg-zinc-900 p-5 rounded-[2rem] border-2 border-zinc-800 shadow-xl flex flex-col justify-between cursor-pointer active:scale-95 transition-transform hover:border-blue-500">
                    <div>
                        <p class="text-[10px] font-black text-zinc-500 uppercase truncate mb-1">${e.prenom}</p>
                        <p class="text-sm font-black uppercase truncate text-white">${e.nom}</p>
                    </div>
                    <div class="flex justify-between items-end mt-4">
                        <span class="${colorC} font-black text-4xl italic">${ptsTotal}<span class="text-xl text-zinc-600">/${balisesTotal || '-'}</span></span>
                        <span class="bg-black border border-zinc-700 text-white px-3 py-1 rounded-lg font-black text-xs italic">${e.code}</span>
                    </div>
                </div>`;
            });
        }

        function openDetails(name, code) {
            document.getElementById('cartonName').innerText = name;
            const session = state.lastLiveSnap[state.activeCl] || {};
            const scoreObj = session[code] || {};
            
            const detailCont = document.getElementById('cartonDetails');
            detailCont.innerHTML = "";
            let ptsT = 0, totT = 0;

            Object.keys(scoreObj).forEach(circKey => {
                const cData = scoreObj[circKey];
                ptsT += cData.pts; totT += cData.total;
                
                detailCont.innerHTML += `<div class="text-xs font-black text-zinc-500 mb-2 uppercase border-b border-zinc-800 pb-1">${circKey}</div>`;
                
                (cData.details || []).forEach((det, i) => {
                    let cssClass = "case-empty";
                    if(det.status === "correct") cssClass = "case-correct";
                    else if(det.status === "wrong") cssClass = "case-wrong";
                    
                    detailCont.innerHTML += `
                    <div class="bg-black p-4 rounded-2xl flex items-center justify-between border-2 border-zinc-800 mb-2">
                        <span class="text-xs font-black text-zinc-400">Poste ${i+1} <span class="bg-zinc-800 px-2 py-1 rounded text-white ml-2">Balise ${det.balise}</span></span>
                        <div class="text-xl font-black rounded-xl px-6 py-2 ${cssClass}">${det.userCode || "---"}</div>
                    </div>`;
                });
            });

            document.getElementById('cartonScore').innerText = `${ptsT} / ${totT || 0}`;
            document.getElementById('modalCarton').classList.remove('hidden');
        }

        function switchTab(t) {
            ['viewClasses','viewConfig','viewLive'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['btnTab1','btnTab2','btnTab3'].forEach(b => document.getElementById(b).classList.remove('tab-active','text-blue-500'));
            document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
            document.getElementById('btnTab'+(t==='classes'?'1':t==='config'?'2':'3')).classList.add('tab-active');
        }

        function resetScores() { if(prompt("Code Sécurité RNE :")==="0680013V" && confirm("Vider tous les scores ?")) db.ref('sessions').remove(); }
        init();
    </script>
</body>
</html>
