<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master | CO-Logic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .row-A { border-left: 5px solid #ef4444; } .row-B { border-left: 5px solid #3b82f6; }
        .row-C { border-left: 5px solid #22c55e; } .row-D { border-left: 5px solid #eab308; }
        .row-E { border-left: 5px solid #a855f7; } .row-F { border-left: 5px solid #ec4899; }
    </style>
</head>
<body class="bg-slate-950 text-white p-4">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black text-blue-500 uppercase italic">CO-Logic Master</h1>
        <div class="flex gap-2 text-[10px]">
            <button onclick="exportCSV()" class="bg-green-600 px-3 py-2 rounded font-bold uppercase">Export iDoceo</button>
            <button onclick="resetScores()" class="bg-red-600 px-3 py-2 rounded font-bold uppercase">Vider Scores</button>
        </div>
    </header>

    <nav class="flex border-b border-slate-800 mb-6 font-bold text-[10px] uppercase tracking-widest">
        <button id="btnTab1" onclick="switchTab('classes')" class="px-4 py-3 tab-active">👨‍🎓 Classes</button>
        <button id="btnTab2" onclick="switchTab('config')" class="px-4 py-3 text-slate-500">⚙️ Parcours</button>
        <button id="btnTab3" onclick="switchTab('live')" class="px-4 py-3 text-slate-500">📊 Résultats</button>
    </nav>

    <div id="viewClasses" class="space-y-4">
        <div class="bg-slate-900 p-4 rounded-2xl flex flex-wrap gap-4 items-center justify-between border border-slate-800">
            <select id="selectClasse" onchange="changeClasse(this.value)" class="bg-slate-800 p-2 rounded font-bold text-sm"></select>
            <input type="file" id="csvEleves" class="text-[10px] text-slate-500">
        </div>
        <div id="eleveList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3"></div>
    </div>

    <div id="modalAttr" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-700 w-full max-w-md">
            <h3 id="attrTitle" class="text-center font-black uppercase mb-6">Attribuer un code</h3>
            <div class="grid grid-cols-6 gap-2">
                <script>
                    const groups = ["A","B","C","D","E","F"];
                    groups.forEach(g => {
                        document.write(`<div class="flex flex-col gap-2">`);
                        for(let i=1; i<=6; i++) {
                            document.write(`<button onclick="confirmAttr('${g}${i}')" class="bg-slate-800 py-3 rounded font-bold text-xs hover:bg-blue-600">${g}${i}</button>`);
                        }
                        document.write(`</div>`);
                    });
                </script>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 py-3 text-xs font-bold opacity-50">ANNULER</button>
        </div>
    </div>

    <div id="viewConfig" class="hidden space-y-6">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h3 class="font-black text-blue-400 uppercase mb-4 text-sm">1. Matrice des codes</h3>
            <input type="file" id="csvCodes" class="text-xs">
            <p id="matriceStatus" class="text-[10px] mt-2 italic opacity-50">Aucune matrice chargée.</p>
        </div>
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-blue-400 uppercase text-sm">2. Circuits</h3>
                <button onclick="addCircuit()" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">+ AJOUTER</button>
            </div>
            <div id="circuitList" class="space-y-2"></div>
            <div class="mt-4 pt-4 border-t border-slate-800 flex items-center gap-2">
                <span class="text-[10px] font-bold uppercase">Validation :</span>
                <select id="valMode" onchange="updateSettings()" class="bg-slate-800 text-[10px] p-1 rounded font-bold">
                    <option value="step">Balise par balise (immédiat)</option>
                    <option value="final">Carton complet (à la fin)</option>
                </select>
            </div>
        </div>
    </div>

    <div id="viewLive" class="hidden">
        <div id="resultGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://orientshow-3a86f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = {
            classes: JSON.parse(localStorage.getItem('co_pro_classes')) || { "305": [] },
            activeCl: localStorage.getItem('co_pro_active') || "305",
            circuits: [], 
            valMode: 'step',
            targetIdx: null
        };

        function init() {
            updateClSelect();
            renderEleves();
            db.ref('settings/config').on('value', snap => {
                const c = snap.val() || {};
                state.circuits = c.circuits || [];
                state.valMode = c.valMode || 'step';
                document.getElementById('valMode').value = state.valMode;
                renderCircuits();
            });
            db.ref('settings/matrice').on('value', snap => {
                document.getElementById('matriceStatus').innerText = snap.exists() ? "✅ Matrice active sur Firebase" : "❌ Matrice manquante";
            });
            db.ref('sessions').on('value', snap => renderLive(snap.val() || {}));
        }

        // --- ATTRIBUTION PAR TABLEAU ---
        function openAttr(idx) {
            state.targetIdx = idx;
            document.getElementById('attrTitle').innerText = "Code pour " + state.classes[state.activeCl][idx].nom;
            document.getElementById('modalAttr').classList.remove('hidden');
        }
        function confirmAttr(code) {
            state.classes[state.activeCl][state.targetIdx].code = code;
            saveAndSync();
            closeModal();
        }
        function closeModal() { document.getElementById('modalAttr').classList.add('hidden'); }

        // --- MATRICE & CIRCUITS ---
        document.getElementById('csvCodes').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
                const head = lines[0].split(lines[0].includes(';')?';':',');
                const mat = {};
                lines.slice(1).forEach(l => {
                    const p = l.split(l.includes(';')?';':',');
                    const b = p[0]; mat[b] = {};
                    head.slice(1).forEach((h, i) => mat[b][h.trim()] = p[i+1].trim());
                });
                db.ref('settings/matrice').set(mat);
                alert("Matrice importée !");
            };
            reader.readAsText(e.target.files[0]);
        });

        function addCircuit() {
            const b = prompt("N° des balises (ex: 31,34,42) :");
            if(b) {
                state.circuits.push({ id: state.circuits.length+1, balises: b.split(',').map(x=>x.trim()) });
                updateSettings();
            }
        }
        function updateSettings() {
            db.ref('settings/config').set({ circuits: state.circuits, valMode: document.getElementById('valMode').value });
            db.ref('settings/classesNames').set(Object.keys(state.classes));
        }

        // --- UTILITAIRES ---
        function saveAndSync() {
            localStorage.setItem('co_pro_classes', JSON.stringify(state.classes));
            localStorage.setItem('co_pro_active', state.activeCl);
            renderEleves();
            updateSettings();
        }
        function renderEleves() {
            const cont = document.getElementById('eleveList');
            cont.innerHTML = (state.classes[state.activeCl] || []).map((e, i) => `
                <div onclick="openAttr(${i})" class="bg-slate-900 p-4 rounded-xl border border-slate-800 cursor-pointer hover:border-blue-500 row-${e.code?e.code[0]:''}">
                    <p class="text-xs font-black uppercase">${e.nom} ${e.prenom}</p>
                    <p class="text-lg font-black text-blue-500 mt-2">${e.code || '--'}</p>
                </div>
            `).join('');
        }
        function renderCircuits() {
            document.getElementById('circuitList').innerHTML = state.circuits.map((c, i) => `
                <div class="bg-slate-950 p-3 rounded border border-slate-800 flex justify-between items-center text-[10px]">
                    <span><b>CIRCUIT ${c.id}</b> : ${c.balises.join(' - ')}</span>
                    <button onclick="state.circuits.splice(${i},1);updateSettings()" class="text-red-500">SUPPR</button>
                </div>`).join('');
        }
        function renderLive(data) {
            const cont = document.getElementById('resultGrid');
            if(!cont) return;
            cont.innerHTML = "";
            const session = data[state.activeCl] || {};
            (state.classes[state.activeCl] || []).forEach(e => {
                if(!e.code) return;
                const score = session[e.code] || {};
                const pts = Object.values(score).reduce((a,b) => a + b.pts, 0);
                cont.innerHTML += `<div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[10px] font-bold opacity-50 uppercase">${e.nom}</p>
                    <div class="flex justify-between items-end mt-2">
                        <span class="text-3xl font-black text-blue-400">${pts}</span>
                        <span class="text-[10px] font-bold">${e.code}</span>
                    </div>
                </div>`;
            });
        }
        function switchTab(t) {
            ['viewClasses','viewConfig','viewLive'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['btnTab1','btnTab2','btnTab3'].forEach(b => document.getElementById(b).classList.remove('tab-active','text-blue-500'));
            document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
            if(t==='live') updateBilan();
        }
        function changeClasse(v) { state.activeCl = v; saveAndSync(); }
        function updateClSelect() { document.getElementById('selectClasse').innerHTML = Object.keys(state.classes).map(c=>`<option value="${c}" ${c===state.activeCl?'selected':''}>${c}</option>`).join(''); }
        function resetScores() { if(confirm("Vider?")) db.ref('sessions').remove(); }
        
        // Import iDoceo
        document.getElementById('csvEleves').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
                const h = lines[0].replace(/"/g,'').split(lines[0].includes(';')?';':',');
                const inNom = h.indexOf('@lastname'), inPre = h.indexOf('@name');
                const cl = prompt("Nom classe?");
                state.classes[cl] = lines.slice(1).map(l => {
                    const p = l.split(l.includes(';')?';':',').map(v=>v.replace(/"/g,'').trim());
                    return { nom: p[inNom], prenom: p[inPre], code: '' };
                });
                state.activeCl = cl; updateClSelect(); saveAndSync();
            };
            reader.readAsText(e.target.files[0], "ISO-8859-1");
        });

        init();
    </script>
</body>
</html>
