<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carton CO | Élève</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CO-Logic">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; touch-action: manipulation; font-family: sans-serif; user-select: none; }
        .box-input { background: #fff; color: #000; font-size: 3.5rem; font-weight: 900; text-align: center; border-radius: 1.5rem; padding: 1.5rem; border: 6px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .case-correct { background-color: #16a34a !important; color: white !important; border-color: #4ade80 !important; pointer-events: none; }
        .case-wrong { background-color: #991b1b !important; color: white !important; border-color: #f87171 !important; text-decoration: line-through; pointer-events: none; opacity: 0.9; }
        .numpad-btn { background: #111; color: #fff; border-radius: 1rem; font-size: 2.5rem; font-weight: 900; display: flex; justify-content: center; align-items: center; padding: 2rem; border: 4px solid #333; transition: transform 0.1s; }
        .numpad-btn:active { background: #3b82f6; border-color: #fff; transform: scale(0.95); }
    </style>
</head>
<body class="p-2 h-screen flex flex-col">
    <div id="app" class="w-full h-full max-w-2xl mx-auto flex flex-col relative">
        
        <div id="courseStatus" class="bg-zinc-900 border-2 border-zinc-800 text-center py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-zinc-400 mb-4 hidden shrink-0">
            Sélectionne ta classe
        </div>

        <div id="mainContent" class="flex-1 flex flex-col min-h-0">
            <div id="step0" class="flex-1 flex flex-col justify-center space-y-10 text-center p-4">
                <h2 class="text-6xl font-black text-blue-500 uppercase italic">CO-Logic</h2>
                <div id="listCl" class="flex flex-col gap-6"></div>
            </div>

            <div id="step1" class="hidden flex-1 flex flex-col">
                <p class="text-center font-black text-zinc-500 text-xl uppercase tracking-[0.3em] mb-4 shrink-0">Ton Code Équipe</p>
                <div class="grid grid-cols-6 gap-2 flex-1 pb-4">
                    <script>
                        ["A","B","C","D","E","F"].forEach(l => {
                            document.write(`<div class="flex flex-col gap-2">`);
                            for(let i=1; i<=6; i++) {
                                document.write(`<button onclick="setTeam('${l}${i}')" class="bg-zinc-900 flex-1 rounded-xl font-black text-2xl border-4 border-zinc-800 active:bg-blue-600 active:border-white transition-all flex items-center justify-center">${l}${i}</button>`);
                            }
                            document.write(`</div>`);
                        });
                    </script>
                </div>
            </div>

            <div id="step2" class="hidden flex-1 flex flex-col h-full transition-opacity opacity-50 pointer-events-none">
                <div class="flex justify-between items-center bg-zinc-900 p-6 rounded-3xl border-4 border-zinc-800 shrink-0 mb-4">
                    <div class="font-black text-5xl text-blue-500 italic" id="teamLabel"></div>
                    <select id="selCirc" onchange="loadCirc(this.value)" class="bg-blue-600 p-4 rounded-xl font-black text-lg uppercase text-white outline-none border-4 border-blue-400">
                        <option value="">-- CHOISIR CIRCUIT --</option>
                    </select>
                </div>
                <div id="carton" class="space-y-4 flex-1 overflow-y-auto pb-4 pr-2"></div>
                <button id="btnFinish" onclick="submitFinal()" class="hidden shrink-0 w-full bg-blue-600 py-8 rounded-3xl font-black text-3xl uppercase text-white border-4 border-blue-400 active:bg-blue-800 mt-2">
                    Valider le carton
                </button>
            </div>

            <div id="step3" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center text-center p-8 z-50">
                <div id="bigIcon" class="text-[10rem] mb-6"></div>
                <div id="finalScore" class="text-[10rem] font-black italic text-blue-500 leading-none"></div>
                <p class="uppercase font-black text-zinc-500 tracking-[0.4em] text-2xl mt-8">Score final</p>
                <button onclick="location.reload()" class="mt-20 bg-zinc-900 px-16 py-8 rounded-3xl font-black uppercase text-xl border-4 border-zinc-700">Nouvelle Course</button>
            </div>
        </div>

        <div id="numpadModal" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col p-4 justify-end">
            <div class="bg-zinc-900 p-6 rounded-[3rem] border-4 border-zinc-800 w-full max-w-lg mx-auto mb-2 flex flex-col h-[85vh]">
                <div class="text-center mb-6 shrink-0">
                    <p class="text-blue-500 font-black italic text-3xl mb-4 uppercase" id="numpadTitle">Saisie Balise</p>
                    <div id="numpadDisplay" class="bg-black rounded-2xl py-6 text-7xl font-black text-white tracking-widest border-4 border-zinc-700 h-32 flex items-center justify-center">---</div>
                </div>
                <div class="grid grid-cols-3 gap-3 flex-1">
                    <button class="numpad-btn" onclick="npType('1')">1</button>
                    <button class="numpad-btn" onclick="npType('2')">2</button>
                    <button class="numpad-btn" onclick="npType('3')">3</button>
                    <button class="numpad-btn" onclick="npType('4')">4</button>
                    <button class="numpad-btn" onclick="npType('5')">5</button>
                    <button class="numpad-btn" onclick="npType('6')">6</button>
                    <button class="numpad-btn" onclick="npType('7')">7</button>
                    <button class="numpad-btn" onclick="npType('8')">8</button>
                    <button class="numpad-btn" onclick="npType('9')">9</button>
                    <button class="numpad-btn text-red-500 !text-2xl" onclick="npDel()">EFF</button>
                    <button class="numpad-btn" onclick="npType('0')">0</button>
                    <button class="numpad-btn !bg-blue-600 text-white !border-blue-400" onclick="npOk()">OK</button>
                </div>
                <button onclick="document.getElementById('numpadModal').classList.add('hidden')" class="w-full mt-6 py-6 text-zinc-500 font-black uppercase text-xl border-4 border-zinc-800 rounded-2xl shrink-0">Annuler</button>
            </div>
        </div>

    </div>

        const MATRICE = {};
        const lines = RAW_CSV.split('\n');
        const headers = lines[0].trim().split(';');
        for(let i=1; i<lines.length; i++) {
            const cols = lines[i].trim().split(';');
            if(cols.length < 2) continue;
            MATRICE[cols[0]] = {};
            for(let j=1; j<cols.length; j++) MATRICE[cols[0]][headers[j]] = cols[j];
        }

        let CONFIG = {}, cl = "", team = "", circ = null;
        let isCourseActive = false, cartonDetails = [];
        let activeBoxIdx = null, activeBaliseNum = null, tempCode = "";

        // INIT & LISTENERS
        db.ref('settings').on('value', snap => {
            const d = snap.val() || {};
            CONFIG = d.config || {};
            const names = d.classesNames || [];
            document.getElementById('listCl').innerHTML = names.map(n => `<button onclick="setCl('${n}')" class="bg-zinc-900 p-8 rounded-3xl text-4xl font-black uppercase border-4 border-zinc-800 shadow-xl active:bg-blue-600 active:border-white transition-all">${n}</button>`).join('');
            if(CONFIG.circuits) {
                document.getElementById('selCirc').innerHTML = '<option value="">-- CHOISIR CIRCUIT --</option>' + CONFIG.circuits.map(c=>`<option value="${c.id}">CIRCUIT ${c.id}</option>`).join('');
            }
        });

        // CHRONO LISTENER - LA MODIFICATION CLE EST ICI !
        function listenToCourse() {
            const status = document.getElementById('courseStatus');
            const step2 = document.getElementById('step2'); // On cible uniquement le Carton
            status.classList.remove('hidden');

            db.ref(`settings/startTime/${cl}`).on('value', s => {
                const startT = s.val();
                db.ref(`settings/endTime/${cl}`).on('value', e => {
                    const endT = e.val();
                    if(!startT) {
                        isCourseActive = false; step2.classList.add('opacity-50','pointer-events-none');
                        status.innerText = "ATTENTE DU TOP DÉPART PROF..."; status.className = "bg-zinc-900 border-2 border-zinc-800 text-center py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-zinc-500 mb-4 shrink-0";
                    } else if(startT && !endT) {
                        isCourseActive = true; step2.classList.remove('opacity-50','pointer-events-none');
                        status.innerText = "🏃‍♂️ COURSE EN COURS"; status.className = "bg-emerald-900 border-2 border-emerald-500 text-center py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-white mb-4 shrink-0";
                    } else {
                        isCourseActive = false; step2.classList.add('opacity-50','pointer-events-none');
                        status.innerText = "🛑 COURSE TERMINÉE"; status.className = "bg-red-900 border-2 border-red-500 text-center py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-white mb-4 shrink-0";
                    }
                });
            });
        }

        function setCl(n) { cl = n; document.getElementById('step0').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden'); listenToCourse(); }
        function setTeam(t) { team = t; document.getElementById('teamLabel').innerText = t; document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }

        function loadCirc(id) {
            circ = CONFIG.circuits.find(c => c.id == id);
            if(!circ) return;
            
            cartonDetails = circ.balises.map(b => ({ balise: b, userCode: "", status: "empty" }));
            
            const cont = document.getElementById('carton');
            cont.innerHTML = circ.balises.map((b, i) => `
                <div id="boxContainer${i}" class="bg-zinc-900 p-6 rounded-[2rem] border-4 border-zinc-800 flex flex-col gap-4 shadow-xl">
                    <div class="flex justify-between items-center text-sm font-black text-zinc-500 uppercase tracking-widest px-2">
                        <span>Poste ${i+1}</span>
                        <span class="bg-black px-4 py-2 rounded-xl border-2 border-zinc-700 text-white">Balise ${b}</span>
                    </div>
                    <div id="val${i}" onclick="openNumpad(${i}, ${b})" class="box-input shadow-inner">---</div>
                </div>
            `).join('');
            
            if(CONFIG.valMode === 'final') {
                document.getElementById('btnFinish').classList.remove('hidden');
            } else {
                document.getElementById('btnFinish').classList.add('hidden');
            }
        }

        function openNumpad(idx, baliseNum) {
            activeBoxIdx = idx; activeBaliseNum = baliseNum; tempCode = "";
            document.getElementById('numpadTitle').innerText = `POSTE ${idx+1} (Balise ${baliseNum})`;
            document.getElementById('numpadDisplay').innerText = "---";
            document.getElementById('numpadModal').classList.remove('hidden');
        }

        function npType(n) { if(tempCode.length < 5) tempCode += n; document.getElementById('numpadDisplay').innerText = tempCode; }
        function npDel() { tempCode = tempCode.slice(0, -1); document.getElementById('numpadDisplay').innerText = tempCode || "---"; }
        
        function npOk() {
            if(!tempCode) return;
            document.getElementById('numpadModal').classList.add('hidden');
            const box = document.getElementById('val'+activeBoxIdx);
            box.innerText = tempCode;
            
            cartonDetails[activeBoxIdx].userCode = tempCode;
            
            if(CONFIG.valMode === 'step') {
                checkSingle(activeBoxIdx, activeBaliseNum, tempCode);
            }
        }

        function checkSingle(idx, bal, userCode) {
            const box = document.getElementById('val'+idx);
            const correct = MATRICE[bal][team];
            
            if(userCode == correct) { 
                box.classList.add('case-correct'); 
                cartonDetails[idx].status = "correct";
            } else { 
                box.classList.add('case-wrong'); 
                cartonDetails[idx].status = "wrong";
            }
            syncScore();
        }

        function submitFinal() {
            if(!confirm("Valider définitivement ce carton ?")) return;
            
            circ.balises.forEach((bal, i) => {
                const userCode = cartonDetails[i].userCode;
                if(userCode === "") return;
                const box = document.getElementById('val'+i);
                const correct = MATRICE[bal][team];
                
                if(userCode == correct) { 
                    box.classList.add('case-correct'); 
                    cartonDetails[i].status = "correct";
                } else { 
                    box.classList.add('case-wrong'); 
                    cartonDetails[i].status = "wrong";
                }
            });

            syncScore();
            
            const pts = cartonDetails.filter(d => d.status === "correct").length;
            setTimeout(() => {
                document.getElementById('finalScore').innerText = pts + "/" + circ.balises.length;
                document.getElementById('bigIcon').innerText = (pts === circ.balises.length) ? "🏆" : "🆗";
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }, 1000);
        }

        function syncScore() {
            const pts = cartonDetails.filter(d => d.status === "correct").length;
            db.ref(`sessions/${cl}/${team}/Circ_${circ.id}`).set({ 
                pts: pts, 
                total: circ.balises.length,
                details: cartonDetails,
                timestamp: Date.now() 
            });
        }
    </script>
</body>
</html>
